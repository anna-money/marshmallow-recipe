name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        marshmallow:
          - "marshmallow==2.20.5"
          - "marshmallow[reco]==2.20.5"
          - "marshmallow>=2,<3"
          - "marshmallow[reco]>=2,<3"
          - "marshmallow>=3,<4"
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Use python ${{ matrix.python-version }}
        run: echo ${{ matrix.python-version }} > .python-version
      - name: Install dependencies
        run: make deps
      - name: Install ${{ matrix.marshmallow }}
        run: uv pip install "${{ matrix.marshmallow }}"
      - name: Lint
        run: make lint
      - name: Tests
        run: make test

  build-speedup-wheels:
    name: Build speedup wheels (${{ matrix.os }} ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-13
            target: x86_64
          - os: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Setup QEMU
        if: matrix.target == 'aarch64' && matrix.os == 'ubuntu-latest'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          working-directory: packages/marshmallow-recipe-speedup

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: speedup-wheels-${{ matrix.os }}-${{ matrix.target }}
          path: packages/marshmallow-recipe-speedup/dist/*.whl

  build-speedup-sdist:
    name: Build speedup sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: packages/marshmallow-recipe-speedup

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: speedup-sdist
          path: packages/marshmallow-recipe-speedup/dist/*.tar.gz

  build-main-package:
    name: Build main package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: main-package
          path: dist/*

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test, build-speedup-wheels, build-speedup-sdist, build-main-package]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download speedup artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: speedup-*
          path: dist-speedup
          merge-multiple: true

      - name: Download main package
        uses: actions/download-artifact@v4
        with:
          name: main-package
          path: dist-main

      - name: Publish speedup to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-speedup/

      - name: Publish main to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-main/
